        let currentLang = 'en';

        function selectLanguage(lang) {
            currentLang = lang;
            const dict = translations[lang];

            document.getElementById('current-lang-code').innerText = lang.toUpperCase();
            document.getElementById('badge-text').innerText = dict.badge;

            document.getElementById('mainContent').classList.remove('opacity-0');

        function setDonation(amount) {
            document.getElementById('customDonation').value = amount;
            
            const btns = document.querySelectorAll('.donation-btn');
            btns.forEach(btn => {
                if(btn.innerText === '€' + amount) {
                    btn.className = "donation-btn py-2.5 bg-pink-500 text-white border border-pink-500 rounded-xl text-sm font-bold transition cursor-pointer shadow-sm text-center";
                } else {
                    btn.className = "donation-btn py-2.5 bg-white hover:bg-pink-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 transition cursor-pointer shadow-sm text-center";
                }
            });
        }

        function updateVisualCounters() {
            const dict = translations[currentLang];
            document.getElementById('stats-total').innerText = dict.currencySign + totalDonatedPool.toFixed(2);
            document.getElementById('stats-count').innerText = confirmedGuessesCount;
            
            let progressPercentage = (totalDonatedPool / targetGoal) * 100;
            if (progressPercentage > 100) progressPercentage = 100;
            
            document.getElementById('progress-bar').style.width = progressPercentage + '%';
            document.getElementById('progress-text').innerText = Math.round(progressPercentage) + "%";
        }

        // Helper: Convert Google Sheets serial date number (e.g. 46226) or standard string to JS Date
        function parseSheetDate(rawDate) {
            if (!rawDate) return new Date();
            let str = String(rawDate).trim();
            if (!isNaN(str)) {
                // Convert Google Sheets serial number to JavaScript Date
                const serial = parseFloat(str);
                const utc_days = Math.floor(serial - 25569);
                const utc_value = utc_days * 86400;
                return new Date(utc_value * 1000);
            }
            // Parse standard ISO/String date (e.g. "2026-08-15")
            return new Date(str.replace(/'/g, ''));
        }

        // Helper: Convert decimal fraction (e.g., 0,3069) back into clean HH:MM format if needed
        function parseSheetTime(rawTime) {
            if (!rawTime) return "12:00";
            let str = String(rawTime).replace(',', '.').trim();
            if (!isNaN(str) && parseFloat(str) < 1) {
                const totalSeconds = Math.round(parseFloat(str) * 86400);
                const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
                const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
                return `${hours}:${minutes}`;
            }
            return String(rawTime).replace(/'/g, '');
        }

        async function fetchLiveGuesses() {
            try {
                const response = await fetch(SHEETDB_URL);
                const data = await response.json();
                
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                totalDonatedPool = 0;
                confirmedGuessesCount = 0;

                const localeMap = {
                    en: 'en-US',
                    hr: 'hr-HR',
                    pt: 'pt-PT'
                };

                if (Array.isArray(data) && data.length > 0) {
                    const paidEntries = data.filter(entry => entry.status && entry.status.toLowerCase() === 'paid');

                    if (paidEntries.length > 0) {
                        document.getElementById('feed-empty-msg').classList.add('hidden');
                        
                        [...paidEntries].reverse().forEach(entry => {
                            const amount = parseFloat(entry.donationValue) || 0;
                            totalDonatedPool += amount;
                            confirmedGuessesCount++;

                            const parsedDate = parseSheetDate(entry.guessedDate);
                            const cleanTime = parseSheetTime(entry.guessedTime);

                            const formattedDate = parsedDate.toLocaleDateString(localeMap[currentLang] || 'en-US', { month: 'short', day: 'numeric' });
                            const initials = (entry.firstName[0] || '') + (entry.lastName[0] || '');

                            const feedItem = `
                                <div class="p-3.5 bg-white/90 border border-slate-100 rounded-2xl flex items-center justify-between shadow-sm hover:shadow-md transition">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-full bg-pink-100 text-pink-700 font-extrabold flex items-center justify-center text-xs border border-pink-200">
                                            ${initials.toUpperCase()}
                                        </div>
                                        <div>
                                            <div class="text-sm font-bold text-slate-800">${entry.firstName} ${entry.lastName}</div>
                                            <div class="text-xs text-slate-500 font-medium">${translations[currentLang].date}: <span class="text-pink-600 font-bold">${formattedDate}</span> @ ${cleanTime}</div>
                                        </div>
                                    </div>
                                    <span class="bg-emerald-50 text-emerald-700 border border-emerald-200/60 text-xs px-2.5 py-1 rounded-full font-extrabold">
                                        +${translations[currentLang].currencySign}${amount}
                                    </span>
                                </div>
                            `;
                            feed.insertAdjacentHTML('beforeend', feedItem);
                        });
                    } else {
                        document.getElementById('feed-empty-msg').classList.remove('hidden');
                        document.getElementById('feed-empty-msg').innerText = translations[currentLang].emptyFeed;
                    }
                } else {
                    document.getElementById('feed-empty-msg').classList.remove('hidden');
                    document.getElementById('feed-empty-msg').innerText = translations[currentLang].emptyFeed;
                }
                updateVisualCounters();
            } catch (err) {
                console.error("Error loading live guesses:", err);
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();

            // Prefix dates/times with apostrophe to FORCE text format in Google Sheets
            const newGuess = {
                firstName: document.getElementById('input-fname').value,
                lastName: document.getElementById('input-lname').value,
                email: document.getElementById('input-email').value,
                guessedDate: "'" + document.getElementById('input-date').value,
                guessedTime: "'" + document.getElementById('input-time').value,
                donationValue: parseFloat(document.getElementById('customDonation').value) || 0,
                status: "Pending"
            };

            try {
                await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [newGuess] })
                });

                window.open(REAL_PAYMENT_URL, '_blank');
                document.getElementById('successModal').classList.remove('hidden');

                document.getElementById('babyPoolForm').reset();
                setDonation(10);

            } catch (err) {
                console.error("Could not save guess:", err);
                alert("Something went wrong saving your guess. Please try again.");
            }
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.add('hidden');
        }
    </script>
</body>
</html>
